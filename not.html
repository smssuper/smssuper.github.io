<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muzans Notes Pro - Daily Reset</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --secondary-color: #10b981;
            --danger-color: #ef4444;
            --dark-color: #1e293b;
            --bg-color: #f1f5f9;
            --white: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #334155;
            --text-muted: #64748b;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); margin: 0; padding-bottom: 100px; color: var(--text-main); }

        /* Header dengan efek Glassmorphism */
        header {
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); border-bottom: 1px solid rgba(255,255,255,0.3);
            position: sticky; top: 0; z-index: 1000;
        }

        .home-link { color: var(--primary-color); font-size: 22px; text-decoration: none; transition: 0.2s; }
        .home-link:active { transform: scale(0.9); }
        
        .nav-tabs { display: flex; gap: 5px; background: #e2e8f0; padding: 4px; border-radius: 50px; }
        .tab-btn { border: none; background: transparent; padding: 6px 16px; border-radius: 50px; cursor: pointer; font-weight: 600; color: #64748b; transition: 0.3s; font-size: 13px; }
        .tab-btn.active { background: var(--white); color: var(--primary-color); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        .container { max-width: 850px; margin: 20px auto; padding: 0 12px; }
        
        /* Barisan Sortir Responsif Premium */
        .controls-row { 
            display: flex; align-items: center; gap: 6px; margin-bottom: 18px; 
            background: var(--white); padding: 10px; border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid var(--border-color);
        }
        
        .date-input-filter { 
            padding: 8px 6px; border-radius: 10px; border: 1.5px solid var(--border-color); 
            font-size: 12px; font-weight: 600; outline: none; background: var(--bg-color); 
            color: var(--text-main); font-family: 'Inter', sans-serif; transition: 0.2s;
        }
        .date-input-filter:focus { border-color: var(--primary-color); background: var(--white); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
        
        #filter-phone { flex: 0.8; min-width: 70px; }
        #filter-date { flex: 1.2; min-width: 120px; letter-spacing: -0.3px; } 
        
        .btn-ctrl { border: none; padding: 8px 10px; border-radius: 10px; cursor: pointer; font-size: 11px; font-weight: 700; transition: 0.2s; }
        .btn-all { background: #e2e8f0; color: var(--text-main); flex: 0.5; }
        .btn-all:active { background: #cbd5e1; }
        
        .btn-copy-main { 
            background: linear-gradient(135deg, #f59e0b, #d97706); color: white; flex: 0.6;
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.25);
        }
        .btn-copy-main:active { transform: scale(0.95); }

        .count-display {
            background: linear-gradient(135deg, #1e293b, #0f172a); color: white; 
            padding: 8px 10px; border-radius: 10px; font-size: 11px; font-weight: 800; 
            display: flex; align-items: center; gap: 5px; flex: 0.5; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .notes-grid { display: flex; flex-direction: column; gap: 10px; }

        /* KARTU DIKEMBALIKAN SEPERTI SCREENSHOT */
        .card { 
            background: var(--white); padding: 14px 16px; border-radius: 16px; 
            box-shadow: 0 4px 12px rgba(149, 157, 165, 0.08); border: 1px solid rgba(226, 232, 240, 0.8);
            display: flex; align-items: center; position: relative; gap: 14px; transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
            cursor: pointer;
        }
        .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(149, 157, 165, 0.12); }
        
        .card.status-gagal { background-color: #fff1f2 !important; border-color: #ffe4e6; }
        .card.status-gagal .card-title { color: #e11d48; }
        .card.status-selesai { background-color: #f0fdf4 !important; border-color: #dcfce7; }
        .card.status-selesai .card-title { color: #16a34a; }

        .card-title { 
            font-weight: 800; font-size: 14px; color: var(--dark-color); min-width: 45px; max-width: 65px;
            text-align: left; border-right: 2px dashed #cbd5e1; padding-right: 12px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        
        .card-preview { flex: 1; font-size: 14px; font-weight: 500; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        
        .note-date { 
            background: var(--bg-color); padding: 4px 8px; border-radius: 6px; 
            font-size: 11px; color: var(--text-muted); font-weight: 700; font-family: 'Inter', monospace; 
        }

        .card-actions { display: flex; gap: 6px; }
        .btn-icon { 
            width: 32px; height: 32px; border-radius: 10px; border: none; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; font-size: 14px; color: white; transition: 0.2s; 
        }
        .btn-icon:active { transform: scale(0.9); }
        .btn-icon-edit-date { background: var(--primary-color); }
        .btn-icon-gagal { background: var(--danger-color); }
        .btn-icon-selesai { background: var(--secondary-color); }

        /* MODAL ANIMATED */
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 24px; border-radius: 20px; width: 90%; max-width: 400px; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.2); animation: modalFadeIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        
        /* FAB IMPRESIF */
        .fab { 
            position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; 
            background: linear-gradient(135deg, var(--primary-color), #2563eb); color: white; 
            border-radius: 20px; display: flex; justify-content: center; align-items: center; 
            font-size: 24px; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4); cursor: pointer; border: none; z-index: 1500; transition: 0.2s; 
        }
        .fab:active { transform: scale(0.9) translateY(4px); box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); }
        
        .form-control { width: 100%; padding: 14px; border: 1.5px solid var(--border-color); border-radius: 12px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; margin-bottom: 12px; background: #f8fafc; transition: 0.2s; box-sizing: border-box; }
        .form-control:focus { background: white; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        textarea.form-control { min-height: 160px; resize: vertical; }
        .view-area { background: #f8fafc; padding: 16px; border-radius: 12px; font-size: 14px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; color: var(--text-main); border: 1px solid var(--border-color); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <a href="https://smssuper.github.io/" class="home-link"><i class="fas fa-home"></i></a>
    <div class="nav-tabs">
        <button id="tab-pub" class="tab-btn active"><i class="fas fa-users"></i></button>
        <button id="tab-priv" class="tab-btn hidden"><i class="fas fa-lock"></i></button>
    </div>
    <div style="position: relative;">
        <button class="tab-btn" id="user-menu-btn"><i class="fas fa-user-circle" style="font-size: 20px;"></i></button>
        <div id="login-popup" class="hidden" style="position: absolute; top: 50px; right: 0; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); width: 240px; z-index: 1100; border: 1px solid var(--border-color);">
            <div id="login-fields">
                <input type="email" id="login-email" class="form-control" placeholder="Email">
                <input type="password" id="login-pass" class="form-control" placeholder="Password">
                <button class="btn-ctrl" style="background:var(--secondary-color); color:white; width:100%; padding: 12px; font-size: 14px;" id="btn-login-exec">Login</button>
            </div>
            <div id="logout-field" class="hidden">
                <button class="btn-ctrl" style="background:var(--danger-color); color:white; width: 100%; padding: 12px; font-size: 14px;" id="btn-logout-exec">Logout</button>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="controls-row">
        <select id="filter-phone" class="date-input-filter"></select>
        <input type="date" id="filter-date" class="date-input-filter">
        <button class="btn-ctrl btn-all" id="btn-clear-date">Semua</button>
        <button class="btn-ctrl btn-copy-main" id="btn-copy-filtered"><i class="fas fa-copy"></i> Copy</button>
        <div class="count-display"><i class="fas fa-list"></i> <span id="note-count">0</span></div>
    </div>
    <div id="notes-grid" class="notes-grid"></div>
</div>

<button class="fab" id="btn-add-note"><i class="fas fa-plus"></i></button>
<input type="date" id="global-date-picker" style="position:fixed; top:-100px; left:-100px; opacity:0; pointer-events:none;">

<div id="edit-hp-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 style="margin-top:0; margin-bottom: 5px; color: var(--dark-color);">Edit Pilihan HP</h3>
        <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 18px; margin-top:0;">Pisahkan nama HP dengan tanda koma (,)</p>
        <input type="text" id="hp-list-input" class="form-control" placeholder="Vivo, Realme, Samsung">
        <div style="display: flex; gap: 10px;">
            <button type="button" class="btn-ctrl" style="background:#e2e8f0; color:var(--text-main); flex:1; padding: 12px; font-size: 13px;" onclick="closeModal('edit-hp-modal')">Batal</button>
            <button type="button" class="btn-ctrl" style="background:var(--secondary-color); color:white; flex:1; padding: 12px; font-size: 13px;" id="btn-save-hp">Simpan</button>
        </div>
    </div>
</div>

<div id="form-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="form-modal-title" style="margin-top:0; margin-bottom: 18px; color: var(--dark-color);">Catatan</h3>
        
        <input type="text" id="node-title" class="form-control" placeholder="Judul / Nomor (Contoh: 37 atau Vivo)">
        <textarea id="node-content" class="form-control" placeholder="Tulis rincian catatan di sini..."></textarea>
        
        <div style="display: flex; gap: 10px;">
            <button type="button" class="btn-ctrl" style="background:#e2e8f0; color:var(--text-main); flex:1; padding: 12px; font-size: 13px;" id="btn-cancel-form">Batal</button>
            <button type="button" class="btn-ctrl" style="background:var(--primary-color); color:white; flex:2; padding: 12px; font-size: 13px;" id="btn-save-note">Simpan</button>
        </div>
    </div>
</div>

<div id="detail-modal" class="modal-overlay">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <span id="view-tag" class="note-date" style="font-size: 12px;"></span>
            <button id="btn-close-detail" style="border:none; background:none; cursor:pointer; font-size: 18px; color: var(--text-muted);"><i class="fas fa-times"></i></button>
        </div>
        <h3 id="view-title-text" style="margin-top: 0; margin-bottom: 12px; color: var(--dark-color); border-bottom: 2px dashed #e2e8f0; padding-bottom: 10px;"></h3>
        <div id="view-content" class="view-area"></div>
        <div style="display: flex; gap: 8px; margin-top: 20px;">
            <button class="btn-ctrl" style="background:var(--primary-color); color:white; flex:1; padding: 12px; font-size: 13px;" id="btn-edit-note">Edit</button>
            <button class="btn-ctrl" style="background:#f59e0b; color:white; flex:1; padding: 12px; font-size: 13px;" id="btn-copy-note">Salin</button>
            <button class="btn-ctrl" style="background:var(--danger-color); color:white; padding: 12px; font-size: 13px;" id="btn-delete-note"><i class="fas fa-trash"></i></button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push, update, onValue, remove, query, orderByChild, off } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDIFk2xefmnxU4SLanbvwfmxINSYnobd8c",
      authDomain: "catatan-85af5.firebaseapp.com",
      databaseURL: "https://catatan-85af5-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "catatan-85af5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let currentTab = 'public';
    let currentUser = null;
    let selectedNoteKey = null;
    let isEditing = false;
    let currentNoteData = null;
    let displayedNotes = [];
    let isFirstLoad = true; 
    
    let phoneCategories = JSON.parse(localStorage.getItem('phoneCategories')) || ['Vivo', 'Realme', 'Samsung'];

    function getLocalYYYYMMDD(ts) {
        if (!ts) return "";
        const d = new Date(ts);
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function renderPhoneDropdowns() {
        const filterSelect = document.getElementById('filter-phone');
        let filterHtml = '';
        phoneCategories.forEach(p => { filterHtml += `<option value="${p}">${p}</option>`; });
        filterHtml += '<option value="edit_options" style="font-weight:bold;">⚙️ Edit HP...</option>';
        const currFilter = filterSelect.value;
        filterSelect.innerHTML = filterHtml;
        if (currFilter && phoneCategories.includes(currFilter)) {
            filterSelect.value = currFilter;
        } else if (phoneCategories.length > 0) {
            filterSelect.value = phoneCategories[0];
        }
    }

    document.getElementById('filter-phone').onchange = function() {
        if (this.value === 'edit_options') {
            document.getElementById('hp-list-input').value = phoneCategories.join(", ");
            document.getElementById('edit-hp-modal').style.display = 'flex';
            this.value = phoneCategories[0] || ""; 
        } else {
            initSync();
        }
    };

    document.getElementById('btn-save-hp').onclick = () => {
        const inputVal = document.getElementById('hp-list-input').value;
        phoneCategories = inputVal.split(',').map(s => s.trim()).filter(s => s);
        localStorage.setItem('phoneCategories', JSON.stringify(phoneCategories));
        renderPhoneDropdowns();
        closeModal('edit-hp-modal');
        initSync();
    };

    renderPhoneDropdowns();

    document.getElementById('user-menu-btn').onclick = () => document.getElementById('login-popup').classList.toggle('hidden');
    document.getElementById('btn-login-exec').onclick = login;
    document.getElementById('btn-logout-exec').onclick = logout;
    document.getElementById('tab-pub').onclick = () => { currentTab = 'public'; initSync(); };
    document.getElementById('tab-priv').onclick = () => { if(currentUser) { currentTab = 'private'; initSync(); } };
    document.getElementById('btn-add-note').onclick = openAddModal;
    document.getElementById('btn-cancel-form').onclick = () => closeModal('form-modal');
    document.getElementById('btn-save-note').onclick = handleSave;
    document.getElementById('btn-close-detail').onclick = () => closeModal('detail-modal');
    document.getElementById('btn-copy-note').onclick = copyNote;
    document.getElementById('btn-edit-note').onclick = editFromDetail;
    document.getElementById('btn-delete-note').onclick = confirmDelete;
    document.getElementById('filter-date').onchange = initSync;
    
    document.getElementById('btn-clear-date').onclick = () => { 
        document.getElementById('filter-date').value = ""; initSync(); 
    };

    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        document.getElementById('tab-priv').classList.toggle('hidden', !user);
        document.getElementById('login-fields').classList.toggle('hidden', !!user);
        document.getElementById('logout-field').classList.toggle('hidden', !user);
        initSync();
    });

    function login() { signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value).then(()=>document.getElementById('login-popup').classList.add('hidden')).catch(() => console.error("Login Gagal")); }
    function logout() { signOut(auth).then(() => window.location.reload()); }
    function getDbPath() { return (currentTab === 'private' && currentUser) ? `notes/xurel/users/${currentUser.uid}` : 'notes/xurel/public'; }

    window.updateNoteStatus = function(event, key, status) {
        event.stopPropagation();
        update(ref(db, `${getDbPath()}/${key}`), { status: status });
    };

    window.editNoteDate = function(event, key, currentTs) {
        event.stopPropagation();
        const picker = document.getElementById('global-date-picker');
        picker.value = getLocalYYYYMMDD(currentTs);
        picker.onchange = () => {
            const parts = picker.value.split('-');
            if (parts.length === 3) {
                const newDate = new Date(parts[0], parts[1] - 1, parts[2], 12, 0, 0);
                update(ref(db, `${getDbPath()}/${key}`), { timestamp: newDate.getTime() });
            }
        };
        if (picker.showPicker) picker.showPicker(); else picker.click();
    };

    function initSync() {
        const grid = document.getElementById('notes-grid');
        const countSpan = document.getElementById('note-count');
        const filterInput = document.getElementById('filter-date');
        const filterPhone = document.getElementById('filter-phone');
        
        if (isFirstLoad) {
            filterInput.value = getLocalYYYYMMDD(Date.now());
            isFirstLoad = false;
        }

        const dbRef = ref(db, getDbPath());

        off(dbRef);
        onValue(query(dbRef, orderByChild('timestamp')), (snapshot) => {
            grid.innerHTML = '';
            let items = [];
            snapshot.forEach(child => { items.push({ key: child.key, ...child.val() }); });

            const targetDate = filterInput.value; 
            const targetPhone = filterPhone.value;

            items = items.filter(d => {
                const noteDate = getLocalYYYYMMDD(d.timestamp);
                const dateMatch = (targetDate === "") ? true : (noteDate === targetDate);
                const phoneMatch = (d.phone === targetPhone);
                return dateMatch && phoneMatch;
            });

            items.reverse();
            displayedNotes = items;
            countSpan.innerText = items.length;

            if (items.length === 0) {
                grid.innerHTML = `<div style="text-align:center; color:var(--text-muted); font-size:13px; margin-top:40px; padding: 20px; background: white; border-radius: 12px; border: 1px dashed var(--border-color);">
                    <i class="fas fa-inbox" style="font-size: 24px; color: #cbd5e1; margin-bottom: 10px; display: block;"></i>
                    Belum ada catatan untuk <b>${targetPhone || 'ini'}</b><br>${targetDate ? ' pada tanggal tersebut' : ''}.
                </div>`;
                return;
            }

            items.forEach((d) => {
                const card = document.createElement('div');
                const statusClass = d.status === 'gagal' ? 'status-gagal' : (d.status === 'selesai' ? 'status-selesai' : '');
                card.className = `card ${statusClass}`;
                card.onclick = () => openDetailModal(d.key, d);
                card.innerHTML = `
                    <div class="card-title">${d.title || '?'}</div>
                    <div class="card-preview">${d.content}</div>
                    <div class="card-right">
                        <div class="note-date">${formatDateSlim(d.timestamp)}</div>
                        <div class="card-actions">
                            <button class="btn-icon btn-icon-edit-date" onclick="editNoteDate(event, '${d.key}', ${d.timestamp})"><i class="fas fa-calendar-alt"></i></button>
                            <button class="btn-icon btn-icon-gagal" onclick="updateNoteStatus(event, '${d.key}', 'gagal')"><i class="fas fa-times"></i></button>
                            <button class="btn-icon btn-icon-selesai" onclick="updateNoteStatus(event, '${d.key}', 'selesai')"><i class="fas fa-check"></i></button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        });
    }

    function handleSave() {
        const t = document.getElementById('node-title').value.trim();
        const c = document.getElementById('node-content').value;
        
        let p = "";
        if (isEditing && currentNoteData) {
            p = currentNoteData.phone || "";
        } else {
            p = document.getElementById('filter-phone').value;
            if (p === 'edit_options') p = "";
        }

        if(!c.trim()) return;
        const data = { title: t, content: c, timestamp: Date.now(), phone: p };
        
        if(isEditing && selectedNoteKey) {
            update(ref(db, `${getDbPath()}/${selectedNoteKey}`), data).then(() => closeModal('form-modal'));
        } else {
            data.status = 'default';
            push(ref(db, getDbPath()), data).then(() => closeModal('form-modal'));
        }
    }

    function confirmDelete() {
        if(selectedNoteKey) {
            remove(ref(db, `${getDbPath()}/${selectedNoteKey}`)).then(() => closeModal('detail-modal'));
        }
    }

    function formatDateSlim(ts) { const d = new Date(ts); return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}`; }
    
    window.closeModal = function(id) { 
        document.getElementById(id).style.display = 'none'; 
        if(id==='form-modal') { isEditing = false; selectedNoteKey = null; } 
    };
    
    function openAddModal() { 
        isEditing = false; selectedNoteKey = null; 
        document.getElementById('node-title').value = ""; document.getElementById('node-content').value = ""; 
        document.getElementById('form-modal-title').innerText = "Catatan Baru"; 
        document.getElementById('form-modal').style.display = 'flex'; 
    }
    
    function openDetailModal(key, data) { 
        selectedNoteKey = key; currentNoteData = data; 
        document.getElementById('view-tag').innerText = formatDateSlim(data.timestamp); 
        document.getElementById('view-title-text').innerText = data.title; 
        document.getElementById('view-content').innerText = data.content; 
        document.getElementById('detail-modal').style.display = 'flex'; 
    }
    
    function editFromDetail() { 
        document.getElementById('node-title').value = currentNoteData.title || ""; 
        document.getElementById('node-content').value = currentNoteData.content || ""; 
        document.getElementById('detail-modal').style.display = 'none'; 
        isEditing = true; document.getElementById('form-modal-title').innerText = "Edit Catatan"; 
        document.getElementById('form-modal').style.display = 'flex'; 
    }
    
    function copyNote() { navigator.clipboard.writeText(currentNoteData.content || ""); }
    
    document.getElementById('btn-copy-filtered').onclick = () => {
        if (displayedNotes.length === 0) return;
        navigator.clipboard.writeText(displayedNotes.map(n => n.content.trim()).join('\n'));
    };

    window.onclick = (e) => { if(e.target.classList.contains('modal-overlay')) closeModal(e.target.id); };
</script>
</body>
</html>
