<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero SMS Dashboard Pro - Persistence</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #f4f7fa; --white: #ffffff; --primary: #8e44ad; --secondary: #3498db;
            --success: #2ecc71; --warning: #f39c12; --danger: #e74c3c; --dark: #2c3e50;
            --gray: #95a5a6; --text: #34495e; --shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-body); margin: 0; padding: 0; color: var(--text); }
        .header { display: flex; align-items: center; justify-content: space-between; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); padding: 12px 20px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 1px 10px rgba(0,0,0,0.05); }
        .app-logo { font-weight: 700; font-size: 15px; color: var(--dark); }
        .balance { background: #e8f5e9; color: #2e7d32; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 5px; }
        #sidebar { position: fixed; top: 0; left: -280px; width: 270px; height: 100%; background: var(--white); box-shadow: 5px 0 25px rgba(0,0,0,0.1); transition: 0.4s; z-index: 2000; padding: 30px 20px; box-sizing: border-box; }
        #sidebar.active { left: 0; }
        .sidebar-item { padding: 14px 15px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 12px; margin-bottom: 5px; transition: 0.2s; }
        .sidebar-item:hover { background: #f0f3f6; color: var(--secondary); }
        .container { padding: 15px; max-width: 500px; margin: 0 auto; transition: 0.4s; }
        .card { background: var(--white); padding: 20px; margin-bottom: 15px; border-radius: 16px; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.7); }
        .email-display { width: 100%; padding: 16px; border: 2px solid #edf2f7; border-radius: 12px; text-align: center; font-weight: 700; box-sizing: border-box; margin-bottom: 15px; font-size: 16px; background: #f8fafc; color: var(--dark); }
        .btn { border: none; padding: 14px; border-radius: 12px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 700; width: 100%; font-size: 13px; transition: 0.3s; }
        .btn:active { transform: scale(0.97); }
        .btn-orange { background: linear-gradient(135deg, #f39c12, #e67e22); }
        .btn-yellow { background: linear-gradient(135deg, #f1c40f, #f39c12); color: #2c3e50; }
        .btn-blue { background: linear-gradient(135deg, #3498db, #2980b9); }
        .btn-green { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .btn-purple { background: linear-gradient(135deg, #8e44ad, #7d3c98); }
        .btn-dark { background: #5d6d7e; }
        .row-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
        .card-active { background: #f0fff4; border-left: 5px solid var(--success); display: none; }
        .number-txt { font-size: 24px; font-weight: 700; color: var(--dark); letter-spacing: 1px; }
        .loading-dots { display: flex; justify-content: center; gap: 5px; margin: 15px 0; }
        .dot { width: 6px; height: 18px; background: #aed6f1; border-radius: 3px; animation: wave 1s infinite ease-in-out; }
        @keyframes wave { 0%, 100% { transform: scaleY(0.5); } 50% { transform: scaleY(1.2); } }
        .otp-display { display: none; text-align: center; font-size: 28px; font-weight: 800; color: var(--success); margin: 15px 0; letter-spacing: 4px; border: 2px dashed var(--success); padding: 10px; border-radius: 12px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 5000; display: none; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: var(--white); width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; font-weight: 800; color: var(--gray); text-transform: uppercase; margin-bottom: 6px; }
        .input-group input, .input-group select { width: 100%; padding: 12px 15px; border: 2px solid #edf2f7; border-radius: 12px; box-sizing: border-box; font-size: 14px; }
        #linkModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #ffd3e0 0%, #e1bee7 100%); z-index: 3000; display: none; flex-direction: column; overflow-y: auto; }
        
        /* --- GAYA BARU KARTU LINK WARNA WARNI --- */
        .lm-card { 
            display: flex; 
            align-items: center; 
            border-radius: 14px; 
            padding: 12px; 
            margin-bottom: 12px; 
            color: white; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            border: none;
        }

        .bg-red { background: #f25c78; }
        .bg-blue { background: #4a90e2; }
        .bg-purple { background: #8c5cd3; }
        .bg-orange { background: #f5b041; }
        .bg-green { background: #2ecc71; }
        .bg-teal { background: #00d2d3; }

        .btn-copy-card {
            width: 45px; 
            height: 45px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: rgba(0, 0, 0, 0.15); 
            border-radius: 10px; 
            cursor: pointer;
            font-size: 18px;
            flex-shrink: 0;
            transition: 0.2s;
        }
        .btn-copy-card:active { transform: scale(0.9); }

        .btn-action-circle {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.3); 
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .btn-action-circle:active { transform: scale(0.9); }

        .badge-star {
            font-size: 9px; 
            background: rgba(255,255,255,0.3); 
            padding: 3px 8px; 
            border-radius: 10px; 
            display: inline-block; 
            margin-top: 5px;
            font-weight: 800;
        }
        .badge-price {
            font-size: 10px; 
            background: rgba(0,0,0,0.15); 
            padding: 3px 8px; 
            border-radius: 10px; 
            display: inline-block; 
            margin-top: 5px;
            margin-left: 5px;
            font-weight: 700;
        }
        /* ---------------------------------------- */

        .flash-success { animation: flash 0.5s ease; }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        * { -webkit-tap-highlight-color: transparent; outline: none; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <span class="app-logo">HERO SMS PRO</span>
            <i class="fas fa-times" style="cursor:pointer" onclick="toggleMenu()"></i>
        </div>
        <div id="auth-section">
            <div class="sidebar-item" id="btn-login" onclick="openLoginModal()"><i class="fas fa-sign-in-alt"></i> Login Admin</div>
            <div class="sidebar-item" id="btn-logout" style="display:none; color:var(--danger)" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Keluar</div>
        </div>
        <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
        <div class="sidebar-item" onclick="triggerImport()"><i class="fas fa-file-import"></i> Import Gmail (.txt)</div>
        <div class="sidebar-item" onclick="openPassModal()"><i class="fas fa-key"></i> Edit Password</div>
        <div class="sidebar-item" onclick="location.reload()"><i class="fas fa-sync-alt"></i> Refresh Halaman</div>
    </div>

    <div class="header">
        <div style="display:flex; align-items:center; gap:12px">
            <i class="fas fa-bars menu-icon" onclick="toggleMenu()"></i>
            <span class="app-logo">Hero SMS <i class="fas fa-chevron-down" style="font-size:10px; opacity:0.5"></i></span>
        </div>
        <div class="balance"><i class="fas fa-wallet"></i> <span id="balanceDisplay">$ 0.0000</span> <i class="fas fa-lock lock-icon"></i></div>
    </div>

    <div class="container" id="mainContainer">
        <div class="card">
            <div style="font-size: 10px; color: var(--gray); text-align: right; margin-bottom: 5px;" id="emailCounter">Sisa: 0</div>
            <input type="text" class="email-display" value="Gmail Kosong..." id="emailField" readonly>
            <div class="row-grid" style="margin-top:0">
                <button class="btn btn-orange" onclick="copyEmail()"><i class="far fa-copy"></i> Copy Email</button>
                <button class="btn btn-yellow" onclick="copyPassword()"><i class="fas fa-key"></i> Copy Pass</button>
            </div>
            <div class="row-grid">
                <button class="btn btn-blue" onclick="acakNama()"><i class="far fa-user"></i> Acak Nama</button>
                <button class="btn btn-green" onclick="acakNomorLokal()"><i class="fas fa-phone-alt"></i> Acak Nomor</button>
            </div>
        </div>

        <div class="card" style="padding:10px">
            <div class="row-grid" style="margin-top:0">
                <button class="btn btn-purple" onclick="bukaModalLink()">BUKA LINK</button>
                <button class="btn btn-dark" onclick="window.location.href='https://smssuper.github.io/not.html'">NOT</button>
            </div>
        </div>

        <div class="card card-active" id="orderCard">
            <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:700; color:#718096">
                <span id="orderIdText">#------- - $0.00</span><span id="orderClock" style="color:var(--danger)">15:00</span>
            </div>
            <div style="display:flex; justify-content:center; align-items:center; gap:15px; padding:15px 0">
                <span class="number-txt" id="phoneDisplay">Mencari...</span>
                <i class="far fa-copy" id="copyPhoneIcon" style="color:var(--secondary); cursor:pointer; display:none" onclick="salinNomorTlp()"></i>
            </div>
            <div class="loading-dots" id="otpLoading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div id="otpResult" class="otp-display">000000</div>
            <div style="display:flex; border-radius:10px; overflow:hidden; border:1px solid #e2e8f0; margin-top:10px">
                <button style="flex:1; padding:12px; border:0; background:#f8fafc; font-size:10px; font-weight:800; cursor:pointer" onclick="tombolAksi('DONE')">DONE</button>
                <button style="flex:1; padding:12px; border:0; background:#f8fafc; font-size:10px; font-weight:800; cursor:pointer" onclick="tombolAksi('RESEND')">RESEND</button>
                <button style="flex:1; padding:12px; border:0; background:#f8fafc; font-size:10px; font-weight:800; cursor:pointer" onclick="tombolAksi('CANCEL')">CANCEL</button>
                <button style="flex:1; padding:12px; border:0; background:#f8fafc; font-size:10px; font-weight:800; cursor:pointer" onclick="tombolAksi('REPLACE')">REPLACE</button>
            </div>
        </div>

        <div style="font-size:11px; font-weight:800; color:#a0aec0; margin:20px 0 10px 5px">PESAN NOMOR BARU</div>
        <div class="card" onclick="beliNomorAPI('ka', '6', '0.065')" style="cursor:pointer; display:flex; justify-content:space-between">
            <span style="font-weight:600">Shopee Indonesia</span><span style="color:var(--danger); font-weight:800">$0.065</span>
        </div>
    </div>

    <div class="modal-overlay" id="loginModal">
        <div class="modal-content">
            <h3 style="text-align:center; margin:0 0 20px 0">Login Admin</h3>
            <div class="input-group"><label>Email Address</label><input type="email" id="loginEmail"></div>
            <div class="input-group"><label>Password</label><input type="password" id="loginPass"></div>
            <div class="row-grid"><button class="btn btn-dark" onclick="closeLoginModal()">Batal</button><button class="btn btn-blue" id="btnLoginExec">Masuk</button></div>
            <p id="loginError" style="color:var(--danger); font-size:11px; text-align:center; margin-top:10px"></p>
        </div>
    </div>

    <div class="modal-overlay" id="passModal">
        <div class="modal-content">
            <h3 style="text-align:center; margin:0 0 20px 0">Edit Password Copy</h3>
            <div class="input-group"><label>Password Baru</label><input type="text" id="newPassInput"></div>
            <div class="row-grid"><button class="btn btn-dark" onclick="closePassModal()">Batal</button><button class="btn btn-blue" onclick="savePassword()">Simpan</button></div>
        </div>
    </div>

    <div id="linkModal">
        <div style="display:flex; justify-content:space-between; padding:20px; align-items:center">
            <i class="fas fa-home" style="font-size:24px; color:var(--danger); cursor:pointer" onclick="tutupModalLink()"></i>
            <button class="btn btn-blue" style="width:auto; padding:10px 20px; border-radius:20px" onclick="bukaFormLink(null)"><i class="fas fa-plus"></i> Tambah</button>
        </div>
        <div style="background:var(--white); flex:1; border-radius:30px 30px 0 0; padding:30px 20px; box-shadow:0 -10px 30px rgba(0,0,0,0.05)">
            <h3 style="text-align:center; margin-bottom:30px">LINK SHOPEE</h3>
            <div id="dynamicLinkContainer"></div>
        </div>
    </div>

    <div class="modal-overlay" id="formModal">
        <div class="modal-content">
            <h3 id="formModalTitle" style="text-align:center; margin:0 0 20px 0">Tambah Link</h3>
            <input type="hidden" id="formLinkId">
            <div class="input-group"><label>Nama</label><input type="text" id="formInputNama"></div>
            <div class="input-group"><label>Teks/URL</label><input type="text" id="formInputUrl"></div>
            <div class="input-group"><label>Harga</label><input type="text" id="formInputHarga"></div>
            <div class="input-group"><label>Warna</label>
                <select id="formInputWarna">
                    <option value="bg-red">Merah</option><option value="bg-blue">Biru</option><option value="bg-purple">Ungu</option>
                    <option value="bg-orange">Oranye</option><option value="bg-green">Hijau</option><option value="bg-teal">Teal</option>
                </select>
            </div>
            <div class="row-grid"><button class="btn btn-dark" onclick="tutupFormLink()">Batal</button><button class="btn btn-blue" onclick="simpanDataLink()">Simpan</button></div>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".txt" style="display:none" onchange="handleFile(this)">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc, updateDoc, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-1_1_Mb28fyzxA3EmxaAYNZOxx1zm5HQ",
            authDomain: "smssuper-85754.firebaseapp.com",
            projectId: "smssuper-85754",
            storageBucket: "smssuper-85754.firebasestorage.app",
            messagingSenderId: "516953018540",
            appId: "1:516953018540:web:729bc35237405193744f09"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- PERSISTENCE LOGIC (EMAIL QUEUE) ---
        let emailQueue = JSON.parse(localStorage.getItem('savedEmailQueue')) || [];

        function updateEmailField() { 
            const field = document.getElementById('emailField');
            const counter = document.getElementById('emailCounter');
            field.value = emailQueue.length > 0 ? emailQueue[0] : "Gmail Kosong..."; 
            counter.innerText = "Sisa: " + emailQueue.length;
            localStorage.setItem('savedEmailQueue', JSON.stringify(emailQueue));
        }

        updateEmailField();

        // --- AUTH LOGIC ---
        window.toggleMenu = () => { document.getElementById('sidebar').classList.toggle('active'); };
        window.openLoginModal = () => { document.getElementById('loginModal').style.display = 'flex'; toggleMenu(); };
        window.closeLoginModal = () => { document.getElementById('loginModal').style.display = 'none'; };

        document.getElementById('btnLoginExec').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            try { await signInWithEmailAndPassword(auth, email, pass); closeLoginModal(); } 
            catch (e) { document.getElementById('loginError').innerText = "Akses Ditolak!"; }
        });

        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            const btnLogin = document.getElementById('btn-login'), btnLogout = document.getElementById('btn-logout'), container = document.getElementById('mainContainer');
            if (user) { btnLogin.style.display = 'none'; btnLogout.style.display = 'flex'; container.style.opacity = '1'; container.style.pointerEvents = 'auto'; } 
            else { btnLogin.style.display = 'flex'; btnLogout.style.display = 'none'; container.style.opacity = '0.3'; container.style.pointerEvents = 'none'; }
        });

        // --- DASHBOARD ACTIONS ---
        const BASE_URL = "https://herosms-proxy.you-zainul.workers.dev/";
        let currentId = null, pollTimer = null, countdownTimer = null, timeLeft = 900; 
        let currentService, currentCountry, currentPrice;

        window.copyEmail = () => {
            if (emailQueue.length === 0) return;
            navigator.clipboard.writeText(emailQueue[0]); 
            emailQueue.shift(); 
            updateEmailField(); 
            animateBtn(document.querySelector('.btn-orange'));
        };

        window.copyPassword = () => {
            navigator.clipboard.writeText(localStorage.getItem('userPassword') || "Belum diatur");
            animateBtn(document.querySelector('.btn-yellow'));
        };

        window.triggerImport = () => { document.getElementById('fileInput').click(); toggleMenu(); };
        
        window.handleFile = (input) => {
            const reader = new FileReader();
            reader.onload = (e) => { 
                emailQueue = e.target.result.split('\n').map(em => em.trim()).filter(em => em !== ""); 
                updateEmailField(); 
            };
            reader.readAsText(input.files[0]);
        };

        window.openPassModal = () => { document.getElementById('newPassInput').value = localStorage.getItem('userPassword') || ""; document.getElementById('passModal').style.display = 'flex'; toggleMenu(); };
        window.closePassModal = () => { document.getElementById('passModal').style.display = 'none'; };
        window.savePassword = () => { localStorage.setItem('userPassword', document.getElementById('newPassInput').value); closePassModal(); };
        
        function animateBtn(btn) { btn.classList.add('flash-success'); setTimeout(() => btn.classList.remove('flash-success'), 500); }

        // --- SMS API LOGIC ---
        window.acakNama = () => { 
            const n1 = ["Budi","Siti","Agus","Dewi","Rudi","Ayu"], n2 = ["Santoso","Wijaya","Kusuma","Setiawan"];
            navigator.clipboard.writeText(n1[Math.floor(Math.random()*n1.length)] + " " + n2[Math.floor(Math.random()*n2.length)]);
            animateBtn(document.querySelector('.btn-blue'));
        };
        window.acakNomorLokal = () => { navigator.clipboard.writeText("08" + Math.floor(1000000000 + Math.random() * 9000000000)); animateBtn(document.querySelector('.btn-green')); };
        window.salinNomorTlp = () => {
            navigator.clipboard.writeText(document.getElementById('phoneDisplay').innerText);
            const icon = document.getElementById('copyPhoneIcon'); icon.className = "fas fa-check"; icon.style.color = "#2ecc71";
            setTimeout(() => { icon.className = "far fa-copy"; icon.style.color = "#3498db"; }, 1500);
        };

        window.beliNomorAPI = async (service, country, price) => {
            currentService = service; currentCountry = country; currentPrice = price;
            document.getElementById('orderCard').style.display = 'block';
            document.getElementById('phoneDisplay').innerText = "Mencari...";
            document.getElementById('copyPhoneIcon').style.display = 'none';
            document.getElementById('otpLoading').style.display = 'flex';
            document.getElementById('otpResult').style.display = 'none';
            try {
                const resp = await fetch(`${BASE_URL}?action=getNumber&service=${service}&country=${country}`);
                const text = await resp.text();
                if (text.includes("ACCESS_NUMBER")) {
                    const parts = text.split(":"); currentId = parts[1];
                    document.getElementById('phoneDisplay').innerText = parts[2];
                    document.getElementById('copyPhoneIcon').style.display = 'inline-block';
                    document.getElementById('orderIdText').innerText = `#${currentId} - $${price}`;
                    startCountdown(); startPolling();   
                } else { document.getElementById('orderCard').style.display = 'none'; }
            } catch (e) { document.getElementById('orderCard').style.display = 'none'; }
        };

        function startCountdown() {
            if (countdownTimer) clearInterval(countdownTimer); timeLeft = 900; 
            countdownTimer = setInterval(() => {
                if (timeLeft <= 0) { clearInterval(countdownTimer); return; }
                timeLeft--;
                let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
                document.getElementById('orderClock').innerText = m.toString().padStart(2, '0') + ":" + s.toString().padStart(2, '0');
            }, 1000);
        }

        function startPolling() {
            if(pollTimer) clearInterval(pollTimer);
            pollTimer = setInterval(async () => {
                if(!currentId) return;
                const resp = await fetch(`${BASE_URL}?action=getStatus&id=${currentId}`);
                const text = await resp.text();
                if (text.includes("STATUS_OK")) {
                    clearInterval(pollTimer); document.getElementById('otpLoading').style.display = 'none';
                    document.getElementById('otpResult').innerText = text.split(":")[1]; 
                    document.getElementById('otpResult').style.display = 'block';
                    navigator.clipboard.writeText(text.split(":")[1]);
                } else if (text === "STATUS_CANCEL") {
                    clearInterval(pollTimer); clearInterval(countdownTimer);
                    document.getElementById('orderCard').style.display = 'none'; currentId = null;
                }
            }, 5000); 
        }

        window.tombolAksi = async (tipe) => {
            if(!currentId) return;
            if (tipe === 'DONE' || tipe === 'CANCEL') {
                const status = tipe === 'DONE' ? 6 : 8;
                await fetch(`${BASE_URL}?action=setStatus&id=${currentId}&status=${status}`);
                clearInterval(pollTimer); clearInterval(countdownTimer);
                document.getElementById('orderCard').style.display = 'none'; currentId = null;
                setTimeout(getBalance, 2000); 
            } else if (tipe === 'RESEND') {
                await fetch(`${BASE_URL}?action=setStatus&id=${currentId}&status=3`);
                document.getElementById('otpLoading').style.display = 'flex';
                document.getElementById('otpResult').style.display = 'none';
                startPolling(); 
            } else if (tipe === 'REPLACE') {
                await fetch(`${BASE_URL}?action=setStatus&id=${currentId}&status=8`);
                clearInterval(pollTimer); clearInterval(countdownTimer);
                currentId = null; beliNomorAPI(currentService, currentCountry, currentPrice);
            }
        };

        async function getBalance() {
            try {
                const resp = await fetch(`${BASE_URL}?action=getBalance`);
                const text = await resp.text();
                if(text.includes("ACCESS_BALANCE")) { document.getElementById('balanceDisplay').innerText = "$ " + parseFloat(text.split(":")[1]).toFixed(4); }
            } catch(e) {}
        }
        getBalance();

        // --- FIRESTORE LINK MANAGEMENT (UPDATED STRUCTURE) ---
        const linksCol = collection(db, "links");
        
        window.bukaModalLink = () => { 
            document.getElementById('linkModal').style.display = 'flex'; 
            onSnapshot(query(linksCol, orderBy("createdAt", "desc")), (snapshot) => {
                const container = document.getElementById('dynamicLinkContainer');
                container.innerHTML = ''; 
                snapshot.forEach((docSnap) => {
                    const link = docSnap.data(); const id = docSnap.id;
                    const card = document.createElement('div');
                    
                    card.className = `lm-card ${link.color || 'bg-blue'}`; 
                    
                    card.innerHTML = `
                        <div class="btn-copy-card" id="copyicon-${id}" onclick="salinTeksLink('${id}', '${link.url}')">
                            <i class="far fa-copy"></i>
                        </div>
                        
                        <div style="flex:1; padding:0 15px; cursor:pointer;" onclick="salinTeksLink('${id}', '${link.url}')">
                            <div style="font-weight:700; font-size:15px; text-shadow: 0 1px 2px rgba(0,0,0,0.1);">${link.name || "Tanpa Nama"}</div>
                            <div>
                                <span class="badge-star">STAR</span>
                                <span class="badge-price">${link.price || "Rp 0"}</span>
                            </div>
                        </div>
                        
                        <div style="display:flex; gap:8px;">
                            <div class="btn-action-circle" onclick="bukaFormLink('${id}')" title="Edit">
                                <i class="fas fa-edit"></i>
                            </div>
                            <div class="btn-action-circle" onclick="hapusDataLink('${id}')" title="Hapus">
                                <i class="fas fa-trash"></i>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            });
        };

        window.tutupModalLink = () => { document.getElementById('linkModal').style.display = 'none'; };
        
        window.salinTeksLink = (id, teks) => { 
            navigator.clipboard.writeText(teks); 
            const iconElement = document.getElementById(`copyicon-${id}`); 
            iconElement.innerHTML = '<i class="fas fa-check"></i>'; 
            setTimeout(() => { iconElement.innerHTML = '<i class="far fa-copy"></i>'; }, 1000); 
        };
        
        window.bukaFormLink = async (id) => { 
            document.getElementById('formModal').style.display = 'flex'; 
            if (id) { 
                document.getElementById('formModalTitle').innerText = 'Edit Link'; 
                document.getElementById('formLinkId').value = id; 
            } else { 
                document.getElementById('formModalTitle').innerText = 'Tambah Link'; 
                document.getElementById('formLinkId').value = ''; 
                document.getElementById('formInputNama').value = ''; 
                document.getElementById('formInputUrl').value = ''; 
                document.getElementById('formInputHarga').value = ''; 
                document.getElementById('formInputWarna').value = 'bg-red'; 
            } 
        };
        
        window.tutupFormLink = () => { document.getElementById('formModal').style.display = 'none'; };
        
        window.simpanDataLink = async () => { 
            const id = document.getElementById('formLinkId').value; 
            const newData = { 
                name: document.getElementById('formInputNama').value || "Tanpa Nama", 
                url: document.getElementById('formInputUrl').value || "#", 
                price: document.getElementById('formInputHarga').value || "Rp 0", 
                color: document.getElementById('formInputWarna').value, 
                createdAt: Date.now() 
            }; 
            try { 
                if (id) { 
                    await updateDoc(doc(db, "links", id), newData); 
                } else { 
                    await addDoc(linksCol, newData); 
                } 
                tutupFormLink(); 
            } catch (e) { 
                console.error("Gagal menyimpan:", e); 
            } 
        };
        
        window.hapusDataLink = async (id) => { 
            await deleteDoc(doc(db, "links", id)); 
        };
    </script>
</body>
</html>
